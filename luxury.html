<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Luxury Pret Collection</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    background:#f9f6f2;
    color:#222;
}

/* HERO SECTION */
.hero{
    height:60vh;
    background:palevioletred;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    color:white;
    position:relative;
}

.hero::after{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
}

.hero-content{
    position:relative;
    z-index:2;
}

.hero h1{
    font-size:48px;
    letter-spacing:2px;
}

.hero p{
    margin-top:10px;
    font-size:18px;
}

/* FILTER BUTTONS */
.filters{
    text-align:center;
    margin:40px 0;
}

.filters button{
    padding:10px 20px;
    margin:5px;
    border:none;
    background:lightcoral;
    color:white;
    cursor:pointer;
    border-radius:25px;
    transition:0.3s;
}

.filters button:hover{
    background:#b08d57;
}

/* PRODUCT GRID */
.container{
    width:90%;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
    gap:20px;
    padding-bottom:50px;
}

.card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.card img{
    width:100%;
    height:300px;
    object-fit:cover;
}

.card-body{
    padding:15px;
    text-align:center;
}

.card-body h3{
    font-size:18px;
    margin-bottom:5px;
}

.price{
    color:#b08d57;
    font-weight:bold;
}

/* HIDE CLASS */
.hide{
    display:none;
}
  video{
      width: 400px;
      height: 280px;
   
      border-radius: 10px;
      border: 5px solid rgb(126, 68, 68);
    
    }
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
    <div class="hero-content">
        <h1>Luxury Pret Collection</h1>
        <p>Elegance crafted for modern women</p>
    
               
         <video controls autoplay muted loop>
    <source src="12100731_1920_1080_50fps.mp4" >
          
         
        </veido>
    </div>
</section>

<!-- FILTER BUTTONS -->
<div class="filters">
    <button onclick="filter('all')">All</button>
    <button onclick="filter('bridal')">Bridal Pret</button>
    <button onclick="filter('festive')">Festive</button>
    <button onclick="filter('casual')">Casual Luxury</button>
</div>

<!-- PRODUCTS -->
<div class="container">

    <div class="card bridal">
        <img src="pexels-jawadpics-8784912.jpg">
        <div class="card-body">
            <h3>Royal Bridal Dress</h3>
            <p class="price">PKR 45,000</p>
        </div>
    </div>

    <div class="card festive">
        <img src="pexels-dhanno-20382105.jpg">
        <div class="card-body">
            <h3>Festive Embroidered Suit</h3>
            <p class="price">PKR 28,000</p>
        </div>
    </div>

    <div class="card casual">
        <img src="pexels-dhanno-36325951.jpg">
        <div class="card-body">
            <h3>Luxury Casual Pret</h3>
            <p class="price">PKR 18,000</p>
        </div>
    </div>

    <div class="card bridal">
        <img src="pexels-bijoy-rahaman-2158721638-35560666 (1).jpg">
        <div class="card-body">
            <h3>Heavy Bridal Lehenga</h3>
            <p class="price">PKR 65,000</p>
        </div>
    </div>

    <div class="card festive">
        <img src="pexels-dhanno-29460547.jpg">
        <div class="card-body">
            <h3>Luxury Festive Wear</h3>
            <p class="price">PKR 32,000</p>
        </div>
    </div>

    <div class="card casual">
        <img src="pexels-dhanno-36325844.jpg">
        <div class="card-body">
            <h3>Modern Pret Outfit</h3>
            <p class="price">PKR 15,000</p>
        </div>
    </div>

</div>

<script>
function filter(category){
    let cards = document.querySelectorAll('.card');

    cards.forEach(card => {
        if(category === 'all'){
            card.classList.remove('hide');
        }
        else{
            if(card.classList.contains(category)){
                card.classList.remove('hide');
            }else{
                card.classList.add('hide');
            }
        }
    });
}
</script><br>

</body>
</html>
